# Grant Proposal Analyzer - Fly.io Configuration
# Deploy with: fly launch --copy-config && fly deploy

app = "grant-proposal-analyzer"
primary_region = "iad"  # US East (change to your preferred region)

[build]
  dockerfile = "Dockerfile.fly"

[env]
  # Streamlit configuration
  STREAMLIT_SERVER_PORT = "8080"
  STREAMLIT_SERVER_ADDRESS = "0.0.0.0"
  STREAMLIT_SERVER_HEADLESS = "true"
  STREAMLIT_BROWSER_GATHER_USAGE_STATS = "false"
  STREAMLIT_SERVER_FILE_WATCHER_TYPE = "none"
  STREAMLIT_SERVER_MAX_UPLOAD_SIZE = "50"
  STREAMLIT_SERVER_ENABLE_CORS = "false"
  STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Keep running for concurrent users
  auto_start_machines = true
  min_machines_running = 1    # Always have at least 1 instance
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

# Health check
[[services.http_checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "30s"
  method = "GET"
  path = "/_stcore/health"

# For scaling to handle 5-10 concurrent users, increase count
# fly scale count 2 --region iad
