# Grant Proposal Analyzer - Docker Compose Configuration
# Enterprise deployment with multi-user support (5-10 concurrent users)
#
# Usage:
#   Development:  docker compose up --build
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Scale horizontally: docker compose up -d --scale app=3

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: grant-proposal-analyzer:latest
    container_name: grant-analyzer
    restart: unless-stopped

    # Resource limits for consistent performance with concurrent users
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
      # For Swarm mode scaling
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    ports:
      - "${APP_PORT:-8501}:8501"

    environment:
      # API Keys (loaded from .env file)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}

      # Streamlit Configuration
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=50

      # Production Settings
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=true
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=none

      # Concurrency settings
      - STREAMLIT_SERVER_MAX_MESSAGE_SIZE=200

    volumes:
      # Persist output files
      - ./output:/app/output
      # Mount .env file (do NOT include in image)
      - ./.env:/app/.env:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - grant-analyzer-network

  # Optional: Nginx reverse proxy for production
  # Uncomment for enterprise deployments with SSL/load balancing
  # nginx:
  #   image: nginx:alpine
  #   container_name: grant-analyzer-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - grant-analyzer-network

networks:
  grant-analyzer-network:
    driver: bridge

# For production with external volumes
