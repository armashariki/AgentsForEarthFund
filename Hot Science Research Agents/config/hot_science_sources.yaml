intent:
  description: >-
    Peer-reviewed research, attribution studies, or official institutional data
    releases with direct or indirect implications for climate change drivers,
    impacts, feedbacks, or responses — including extreme heat, drought, extreme
    weather, sea level rise, cryosphere change, ocean change, ecosystem and
    biodiversity response, fire, agriculture, food systems, climate-driven human
    health, climate-driven migration, and connections between Earth-system
    components.
  similarity_threshold: 0.55
  raw_candidate_monthly_target:
    min: 200
    max: 500

seed_terms:
  - climate
  - warming
  - ice
  - drought
  - sea level
  - heat wave
  - wildfire
  - monsoon
  - ENSO
  - ocean
  - glacier
  - permafrost
  - biodiversity
  - ecosystem
  - attribution
  - peatland
  - cryosphere

search_queries:
  - climate change
  - global warming
  - climate impacts
  - extreme heat climate
  - drought climate
  - wildfire climate
  - sea level rise
  - ocean warming
  - cryosphere climate
  - ecosystem climate change
  - climate health
  - climate attribution
  - carbon cycle feedback

