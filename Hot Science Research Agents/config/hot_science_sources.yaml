      - marine heatwave
      - ocean acidification
      - ocean circulation
      - thermal regime
  - id: ecosystems
    label: Ecosystem and biodiversity response
    terms:
      - ecosystem
      - biodiversity
      - species
      - habitat
      - forest
  - id: fire
    label: Fire
    terms:
      - wildfire
      - fire weather
      - burned area
      - smoke
  - id: food_systems
    label: Agriculture and food systems
    terms:
      - crop
      - agriculture
      - food
      - fisheries
      - livestock
  - id: human_health
    label: Climate-driven health
    terms:
      - health
      - mortality
      - disease vector
      - vector-borne
      - malaria
      - dengue
  - id: migration
    label: Climate-driven migration
    terms:
      - migration
      - displacement
      - relocation
      - mobility
  - id: earth_system
    label: Earth-system connections
    terms:
      - earth system
      - feedback
      - carbon cycle
      - teleconnection
      - monsoon
      - ENSO

rubric:
  version: hot_science_v2_candidate
  composite_method: weighted_sum
  dimensions:
    - id: novelty
      label: Novelty
      weight: 1.3
      selection_signal: true
      bonus_only: false
      description: New finding, first observation, or substantial advance over prior work.
    - id: impact_magnitude
      label: Impact magnitude
      weight: 1.3
      selection_signal: true
      bonus_only: false
      description: Scale, consequence, geographic scope, or system-level importance.
    - id: earth_system_signal
      label: Earth-system signal
      weight: 1.2
      selection_signal: true
      bonus_only: false
      description: Climate driver, impact, feedback, risk, response, or connected Earth-system process.
    - id: cross_disciplinary
      label: Cross-disciplinary relevance
      weight: 0.5
      selection_signal: true
      bonus_only: true
      description: Additive signal only; absence must not exclude a candidate.
    - id: cascading_impact
      label: Cascading-impact potential
      weight: 0.5
      selection_signal: true
      bonus_only: true
      description: Additive signal only; absence must not exclude a candidate.
    - id: audience_relevance
      label: Audience relevance
      weight: 0.0
      selection_signal: false
      bonus_only: true
      description: Reserved for future summary drafting, not selection.

watchlist:
  non_target_month_enabled: false
  preprint_bucket_enabled: true

primary_work_type_priority:
  - peer_reviewed_journal_article
  - attribution_report
  - institutional_data_release
  - preprint
  - research_artifact

