      <stop offset="0%" stop-color="#072a20"/>
      <stop offset="55%" stop-color="#04150f"/>
      <stop offset="100%" stop-color="#020b08"/>
    </linearGradient>
    <linearGradient id="stripeFade" x1="0" y1="0" x2="0" y2="1">
