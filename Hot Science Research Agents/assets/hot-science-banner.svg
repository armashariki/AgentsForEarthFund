    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fe7c4"/>
      <stop offset="55%" stop-color="#ffd27a"/>
      <stop offset="100%" stop-color="#ff8a5b"/>
    </linearGradient>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="320" rx="18"/></clipPath>
  </defs>

